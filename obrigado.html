<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compra Confirmada | Vittare</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); padding: 24px; }
    .thanks-card {
      background: var(--bg-card); border: 1.5px solid var(--border-strong);
      border-radius: 20px; padding: 52px 44px; max-width: 540px; width: 100%;
      text-align: center; box-shadow: var(--shadow-gold);
    }
    .thanks-check {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-300), var(--gold-500));
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 0 auto 28px;
    }
    .thanks-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; color: var(--text-primary); margin-bottom: 12px; }
    .thanks-sub { font-size: 15px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 32px; }
    .product-badge {
      display: inline-block; background: rgba(201,169,110,0.1);
      border: 1px solid var(--border-strong); border-radius: 10px;
      padding: 14px 24px; margin-bottom: 32px;
      font-size: 15px; font-weight: 700; color: var(--gold);
    }
    .divider { height: 1px; background: var(--border); margin: 28px 0; }

    /* Upload area */
    .upload-area {
      border: 2px dashed var(--border-strong); border-radius: 14px;
      padding: 28px 20px; text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
    }
    .upload-area:hover { border-color: var(--gold); background: rgba(201,169,110,0.04); }
    .upload-area.has-file { border-color: var(--green); border-style: solid; }
    .upload-icon { font-size: 36px; margin-bottom: 10px; }
    .upload-label { font-size: 14px; color: var(--text-secondary); }
    .upload-label strong { color: var(--gold); }
    #fileInput { display: none; }
    .file-preview { font-size: 13px; color: var(--green); margin-top: 10px; font-weight: 700; }

    /* Register section (if not logged in) */
    .reg-section { text-align: left; margin-bottom: 24px; }
    .reg-section h3 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text-primary); margin-bottom: 8px; }
    .reg-section p { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display:block; font-size:11px; font-weight:700; letter-spacing:0.1em; color:var(--gold); margin-bottom:7px; text-transform:uppercase; }
    .form-group input { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:12px 14px; font-size:14px; color:var(--text-primary); font-family:'Lato',sans-serif; transition:border-color 0.2s; outline:none; }
    .form-group input:focus { border-color:var(--gold); }
    .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:480px) { .form-row-2 { grid-template-columns:1fr; } }

    .wpp-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #25D366; color: #fff;
      font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 900;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 18px 32px; border-radius: 12px; border: none;
      cursor: pointer; text-decoration: none; width: 100%;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(37,211,102,0.3);
      margin-bottom: 16px;
    }
    .wpp-btn:hover { background: #1ebe59; transform: translateY(-2px); }
    .wpp-icon { font-size: 22px; }
    .back-link { font-size: 13px; color: var(--text-muted); display: block; text-align: center; }
    .back-link a { color: var(--gold); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
    .waiting-notice {
      background: rgba(201,169,110,0.08); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px; margin-bottom: 24px;
      font-size: 14px; color: var(--text-secondary); line-height: 1.6;
    }
    .waiting-notice strong { color: var(--gold); }
  </style>
</head>
<body>

<div class="thanks-card" id="mainCard">
  <!-- Content injected by JS depending on login state -->
</div>

<script>
function getClients()  { try { return JSON.parse(localStorage.getItem('vittare_clients')||'[]'); } catch { return []; } }
function saveClients(a){ localStorage.setItem('vittare_clients', JSON.stringify(a)); }
function getUser()     { try { return JSON.parse(sessionStorage.getItem('vittare_user')||'null'); } catch { return null; } }

const card = document.getElementById('mainCard');
const user = getUser();
const WPP_LINK = 'https://api.whatsapp.com/send/?phone=5511977433408&text=Ola,%20comprei%20o%20Diagn%C3%B3stico%20Financeiro%20Profissional,%20estou%20enviando%20%20meus%20documentos%20para%20an%C3%A1lise.';

// Load theme
const saved = localStorage.getItem('vittare-theme');
if (saved) document.documentElement.setAttribute('data-theme', saved);

function renderWithUser(u) {
  card.innerHTML = `
    <div class="thanks-check">✓</div>
    <h1 class="thanks-title">Compra Confirmada!</h1>
    <p class="thanks-sub">
      Olá, <strong>${u.nome.split(' ')[0]}</strong>! Sua compra do
    </p>
    <div class="product-badge">📋 Diagnóstico Financeiro Profissional</div>
    <p class="thanks-sub" style="margin-bottom:20px;">
      foi recebida com sucesso. Nossa equipe entrará em contato em até <strong>3 dias úteis</strong>.
    </p>

    <div class="waiting-notice">
      📲 <strong>Próximo passo:</strong> Clique no botão abaixo para enviar seus documentos para análise via WhatsApp. Isso agiliza o processo!
    </div>

    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📎</div>
      <div class="upload-label">
        <strong>Anexe um comprovante de compra</strong><br>
        (opcional — clique para selecionar)
      </div>
      <div class="file-preview" id="filePreview"></div>
    </div>
    <input type="file" id="fileInput" accept="image/*,application/pdf"/>

    <a href="${WPP_LINK}" class="wpp-btn" target="_blank" id="wppBtn">
      <span class="wpp-icon">💬</span>
      Enviar Documentos via WhatsApp
    </a>
    <span class="back-link"><a href="index.html">← Voltar ao site</a></span>
  `;
  setupUpload();

  // Mark as purchased
  const clients = getClients();
  const idx = clients.findIndex(c => c.email === u.email);
  if (idx >= 0) { clients[idx].comprou = true; clients[idx].dataCompra = new Date().toLocaleDateString('pt-BR'); saveClients(clients); }
}

function renderWithoutUser() {
  card.innerHTML = `
    <div class="thanks-check" style="background:linear-gradient(135deg,#C9A96E,#A8883F);">📋</div>
    <h1 class="thanks-title">Quase lá!</h1>
    <p class="thanks-sub">Você está comprando o <strong>Diagnóstico Financeiro Profissional</strong>.<br>
    Para confirmar e acompanhar seu pedido, crie sua conta ou faça login abaixo.</p>

    <div class="waiting-notice">
      ⚠️ <strong>Atenção:</strong> Crie sua conta antes de finalizar a compra. Assim você poderá acompanhar seu diagnóstico e receber suas orientações.
    </div>

    <div class="reg-section">
      <h3>Criar minha conta</h3>
      <p>Preencha seus dados para continuar.</p>
      <div class="form-row-2">
        <div class="form-group"><label>Nome Completo</label><input type="text" id="rNome" placeholder="Seu nome"/></div>
        <div class="form-group"><label>Telefone</label><input type="text" id="rTel" placeholder="(11) 99999-9999"/></div>
      </div>
      <div class="form-group"><label>E-mail</label><input type="email" id="rEmail" placeholder="seu@email.com"/></div>
      <div class="form-row-2">
        <div class="form-group"><label>Data de Nascimento</label><input type="date" id="rNasc"/></div>
        <div class="form-group"><label>Senha</label><input type="password" id="rPass" placeholder="Crie uma senha"/></div>
      </div>
      <div class="form-group"><label>Endereço</label><input type="text" id="rEnd" placeholder="Rua, nº, bairro, cidade – UF"/></div>

      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📎</div>
        <div class="upload-label"><strong>Anexe comprovante de compra</strong><br>(opcional)</div>
        <div class="file-preview" id="filePreview"></div>
      </div>
      <input type="file" id="fileInput" accept="image/*,application/pdf"/>

      <p id="regErr" style="color:#E85050;font-size:13px;display:none;margin-bottom:12px;"></p>
      <button class="btn-primary btn-full" id="regSubmit" style="margin-bottom:14px;">Criar Conta e Continuar</button>
    </div>

    <span class="back-link"><a href="index.html">← Voltar e fazer login</a></span>
  `;

  setupUpload();

  document.getElementById('regSubmit').addEventListener('click', () => {
    const nome  = document.getElementById('rNome').value.trim();
    const email = document.getElementById('rEmail').value.trim();
    const tel   = document.getElementById('rTel').value.trim();
    const nasc  = document.getElementById('rNasc').value;
    const end   = document.getElementById('rEnd').value.trim();
    const senha = document.getElementById('rPass').value;
    const errEl = document.getElementById('regErr');

    if (!nome||!email||!tel||!nasc||!end||!senha) {
      errEl.textContent='Preencha todos os campos.'; errEl.style.display='block'; return;
    }
    const clients = getClients();
    if (clients.find(c=>c.email===email)) {
      errEl.textContent='E-mail já cadastrado. Faça login no site.'; errEl.style.display='block'; return;
    }
    const newUser = { id:Date.now(), nome, email, tel, nasc, end, senha, comprou:true, data:new Date().toLocaleDateString('pt-BR'), dataCompra:new Date().toLocaleDateString('pt-BR') };
    clients.push(newUser);
    saveClients(clients);
    sessionStorage.setItem('vittare_user', JSON.stringify(newUser));
    renderWithUser(newUser);
    window.open(WPP_LINK, '_blank');
  });
}

function setupUpload() {
  const input = document.getElementById('fileInput');
  const area  = document.getElementById('uploadArea');
  const prev  = document.getElementById('filePreview');
  if (!input) return;
  input.addEventListener('change', () => {
    if (input.files[0]) {
      area.classList.add('has-file');
      prev.textContent = '✅ ' + input.files[0].name;
    }
  });
}

// Render correct state
if (user) {
  renderWithUser(user);
} else {
  renderWithoutUser();
}
</script>
</body>
</html>
